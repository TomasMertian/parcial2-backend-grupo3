services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: app_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
      - "9229:9229"
    volumes:
      - .:/app
      - /app/node_modules

networks:
  default:
    driver: bridge
